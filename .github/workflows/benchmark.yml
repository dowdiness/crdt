name: Benchmark Regression

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark-comparison:
    name: Compare Benchmarks
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Run PR benchmarks
        run: |
          echo "Running benchmarks on PR branch..."
          ./scripts/run-moon-module.sh bench . > pr_bench.txt 2>&1
          cat pr_bench.txt

      - name: Run submodule benchmarks (event-graph-walker)
        run: |
          ./scripts/run-moon-module.sh bench event-graph-walker > pr_egw_bench.txt 2>&1
          cat pr_egw_bench.txt

      - name: Store PR results
        run: |
          mkdir -p benchmark-results
          cp pr_bench.txt benchmark-results/
          cp pr_egw_bench.txt benchmark-results/

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          submodules: recursive
          clean: false

      - name: Run base benchmarks
        continue-on-error: true
        run: |
          echo "Running benchmarks on base branch..."
          if moon update && moon bench --release > base_bench.txt 2>&1; then
            cat base_bench.txt
          else
            echo "(base branch benchmark failed — may not compile)" > base_bench.txt
            cat base_bench.txt
          fi

      - name: Run submodule benchmarks (base - event-graph-walker)
        continue-on-error: true
        run: |
          if (
            cd event-graph-walker
            moon update
            moon bench --release
          ) > base_egw_bench.txt 2>&1; then
            cat base_egw_bench.txt
          else
            echo "(base branch benchmark failed — may not compile)" > base_egw_bench.txt
            cat base_egw_bench.txt
          fi

      - name: Compare results
        id: compare
        run: |
          echo "## Benchmark Comparison Report" > comparison.md
          echo "" >> comparison.md
          echo "Comparing PR branch against \`${{ github.base_ref }}\`" >> comparison.md
          echo "" >> comparison.md

          echo "### Main Module Benchmarks" >> comparison.md
          echo "" >> comparison.md
          echo "**Base branch:**" >> comparison.md
          echo '```' >> comparison.md
          cat base_bench.txt >> comparison.md
          echo '```' >> comparison.md
          echo "" >> comparison.md

          echo "**PR branch:**" >> comparison.md
          echo '```' >> comparison.md
          cat benchmark-results/pr_bench.txt >> comparison.md
          echo '```' >> comparison.md
          echo "" >> comparison.md

          echo "### event-graph-walker Benchmarks" >> comparison.md
          echo "" >> comparison.md
          echo "**Base branch:**" >> comparison.md
          echo '```' >> comparison.md
          cat base_egw_bench.txt >> comparison.md
          echo '```' >> comparison.md
          echo "" >> comparison.md

          echo "**PR branch:**" >> comparison.md
          echo '```' >> comparison.md
          cat benchmark-results/pr_egw_bench.txt >> comparison.md
          echo '```' >> comparison.md
          echo "" >> comparison.md

          echo "---" >> comparison.md
          echo "*Benchmarks run with \`--release\` flag*" >> comparison.md

      - name: Post comment to PR
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const comparison = fs.readFileSync('comparison.md', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Benchmark Comparison Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comparison
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comparison
              });
            }

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-comparison
          path: |
            base_bench.txt
            benchmark-results/pr_bench.txt
            base_egw_bench.txt
            benchmark-results/pr_egw_bench.txt
            comparison.md
          retention-days: 30

  editor-response-benchmark:
    name: Editor Response Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/ideal/web/package-lock.json

      - name: Install web dependencies
        working-directory: examples/ideal/web
        run: npm ci

      - name: Install Playwright browser
        working-directory: examples/ideal/web
        run: npx playwright install --with-deps chromium

      - name: Update MoonBit dependencies
        working-directory: examples/ideal
        run: moon update

      - name: Run realistic editor response benchmark
        working-directory: examples/ideal/web
        env:
          # examples/ideal is a moon.work member; workspace mode emits wasm-gc
          # only when vite-plugin-moonbit builds, so the JS bundle vite expects
          # at _build/js/release/build/main/main.js is never produced. Same
          # treatment as scripts/test-canvas-e2e.sh.
          MOON_WORK: off
        run: npm run test:perf
