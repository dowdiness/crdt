name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-main:
    name: Test Main Module
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Verify MoonBit installation
        run: moon version --all

      - name: Update dependencies
        run: make update

      - name: Check code
        run: make check

      - name: Run tests
        run: make test

      - name: Build
        run: make build

  test-submodules:
    name: Test Submodules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: event-graph-walker
            path: event-graph-walker
          - name: loom
            path: loom/loom
          - name: svg-dsl
            path: svg-dsl
          - name: graphviz
            path: graphviz
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Verify MoonBit installation
        run: moon version --all

      - name: Check and test ${{ matrix.name }}
        run: ./scripts/run-moon-module.sh ci "${{ matrix.path }}"

  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Update dependencies
        run: make update

      - name: Run main module benchmarks
        run: moon bench --release

      - name: Run event-graph-walker benchmarks
        working-directory: event-graph-walker
        run: |
          moon update
          moon bench --release

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Check formatting
        run: make fmt-check

  build-js:
    name: Build JavaScript Target
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Update dependencies
        run: make update

      - name: Build JavaScript artifacts
        run: make build-js

      - name: Upload JS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: moonbit-js-build
          path: |
            _build/js/release/build/canopy.js
            _build/js/release/build/canopy.d.ts
            _build/js/release/build/moonbit.d.ts
            graphviz/_build/js/release/build/browser/browser.js
            graphviz/_build/js/release/build/browser/browser.d.ts
          retention-days: 7

  web-test:
    name: Web Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/web/package-lock.json

      - name: Build web
        run: make build-web

      - name: Run Playwright tests (if they exist)
        working-directory: examples/web
        continue-on-error: true
        run: |
          if [ -d "tests" ] || [ -d "e2e" ]; then
            npx playwright install --with-deps chromium
            npx playwright test
          else
            echo "No Playwright tests found, skipping"
          fi

  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs:
      - test-main
      - test-submodules
      - format-check
      - build-js
      - web-test
    if: always()
    steps:
      - name: Check all job statuses
        run: |
          if [[ "${{ needs.test-main.result }}" != "success" ]] || \
             [[ "${{ needs.test-submodules.result }}" != "success" ]] || \
             [[ "${{ needs.format-check.result }}" != "success" ]] || \
             [[ "${{ needs.build-js.result }}" != "success" ]] || \
             [[ "${{ needs.web-test.result }}" != "success" ]]; then
            echo "❌ One or more required checks failed"
            exit 1
          fi
          echo "✅ All checks passed!"
