name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-main:
    name: Test Main Module
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Verify MoonBit installation
        run: moon version --all

      - name: Update dependencies
        run: make update

      - name: Check code
        run: make check

      - name: Run tests
        run: make test

      - name: Build
        run: make build

  test-submodules:
    name: Test Submodules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: event-graph-walker
            path: event-graph-walker
          - name: loom
            path: loom/loom
          - name: svg-dsl
            path: svg-dsl
          - name: graphviz
            path: graphviz
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Verify MoonBit installation
        run: moon version --all

      - name: Check and test ${{ matrix.name }}
        run: ./scripts/run-moon-module.sh ci "${{ matrix.path }}"

  prove:
    name: Formal Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Cache opam switch
        id: opam-cache
        uses: actions/cache@v4
        with:
          path: ~/.opam
          key: opam-why3-1.7.2-z3-${{ runner.os }}-${{ runner.arch }}

      - name: Install opam
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq opam

      - name: Initialize opam and install Why3/Z3
        if: steps.opam-cache.outputs.cache-hit != 'true'
        run: |
          opam init --disable-sandboxing --yes
          eval $(opam env)
          opam install why3.1.7.2 z3 --yes

      - name: Configure Why3 provers
        run: |
          eval $(opam env)
          why3 config detect

      - name: Update MoonBit dependencies
        working-directory: lib/semantic/proof
        run: moon update

      - name: Run moon prove
        working-directory: lib/semantic/proof
        run: |
          eval $(opam env)
          moon prove

  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Update dependencies
        run: make update

      - name: Run main module benchmarks
        run: moon bench --release

      - name: Run event-graph-walker benchmarks
        working-directory: event-graph-walker
        run: |
          moon update
          moon bench --release

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Check formatting
        run: make fmt-check

  build-js:
    name: Build JavaScript Target
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Update dependencies
        run: make update

      - name: Build JavaScript artifacts
        run: make build-js

      - name: Upload JS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: moonbit-js-build
          path: |
            _build/js/release/build/ffi/lambda/lambda.js
            _build/js/release/build/ffi/lambda/lambda.d.ts
            _build/js/release/build/ffi/lambda/moonbit.d.ts
            _build/js/release/build/ffi/json/json.js
            _build/js/release/build/ffi/json/json.d.ts
            _build/js/release/build/ffi/json/moonbit.d.ts
            _build/js/release/build/ffi/markdown/markdown.js
            _build/js/release/build/ffi/markdown/markdown.d.ts
            _build/js/release/build/ffi/markdown/moonbit.d.ts
            graphviz/_build/js/release/build/browser/browser.js
            graphviz/_build/js/release/build/browser/browser.d.ts
          retention-days: 7

  web-build:
    name: Build Web Example
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/web/package-lock.json

      - name: Update MoonBit dependencies
        run: make update

      - name: Build web
        run: make build-web

  web-e2e:
    name: Web E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/web/package-lock.json

      - name: Install web dependencies
        working-directory: examples/web
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        working-directory: examples/web
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.playwright-version.outputs.version }}-chromium

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: examples/web
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: examples/web
        run: npx playwright install-deps chromium

      - name: Update MoonBit dependencies
        run: make update

      - name: Run web Playwright suite
        run: make test-web-e2e

  demo-react-e2e:
    name: Demo React E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/demo-react/package-lock.json

      - name: Install demo-react dependencies
        working-directory: examples/demo-react
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        working-directory: examples/demo-react
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.playwright-version.outputs.version }}-chromium

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: examples/demo-react
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: examples/demo-react
        run: npx playwright install-deps chromium

      - name: Update MoonBit dependencies
        run: make update

      - name: Run demo-react Playwright suite
        run: make test-demo-react-e2e

  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs:
      - test-main
      - test-submodules
      - prove
      - format-check
      - build-js
      - web-build
      - web-e2e
      - demo-react-e2e
    if: always()
    steps:
      - name: Check all job statuses
        run: |
          if [[ "${{ needs.test-main.result }}" != "success" ]] || \
             [[ "${{ needs.test-submodules.result }}" != "success" ]] || \
             [[ "${{ needs.prove.result }}" != "success" ]] || \
             [[ "${{ needs.format-check.result }}" != "success" ]] || \
             [[ "${{ needs.build-js.result }}" != "success" ]] || \
             [[ "${{ needs.web-build.result }}" != "success" ]] || \
             [[ "${{ needs.web-e2e.result }}" != "success" ]] || \
             [[ "${{ needs.demo-react-e2e.result }}" != "success" ]]; then
            echo "❌ One or more required checks failed"
            exit 1
          fi
          echo "✅ All checks passed!"
