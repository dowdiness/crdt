<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canopy Workflow Canvas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: oklch(18% 0.018 276);
      --surface: oklch(23% 0.02 276 / 0.94);
      --surface-soft: oklch(27% 0.022 276 / 0.82);
      --line: oklch(62% 0.04 276 / 0.22);
      --line-strong: oklch(70% 0.055 276 / 0.38);
      --text: oklch(91% 0.018 276);
      --text-muted: oklch(74% 0.026 276 / 0.72);
      --text-faint: oklch(65% 0.026 276 / 0.56);
      --accent: oklch(63% 0.12 292);
      --accent-soft: oklch(63% 0.12 292 / 0.16);
      --warning: oklch(72% 0.105 54);
      --success: oklch(75% 0.09 130);
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-lg: 16px;
      --space-xl: 24px;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app-shell {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    #canvas-root {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
      cursor: grab;
    }
    #canvas-root::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(oklch(72% 0.045 276 / 0.035) 1px, transparent 1px),
        linear-gradient(90deg, oklch(72% 0.045 276 / 0.035) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
    }
    #canvas-root.panning { cursor: grabbing; }

    #world {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
    }

    #edges {
      position: absolute;
      top: 0; left: 0;
      overflow: visible;
      pointer-events: none;
      transform-origin: 0 0;
    }
    #edges path.edge {
      fill: none;
      stroke: oklch(62% 0.095 292 / 0.78);
      stroke-width: 2;
    }
    #edges path.edge-pending {
      fill: none;
      stroke: oklch(70% 0.085 292 / 0.82);
      stroke-width: 2;
      stroke-dasharray: 5 5;
    }

    .panel {
      position: absolute;
      z-index: 5;
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: 0 18px 48px oklch(8% 0.012 276 / 0.34);
      border-radius: 14px;
    }

    .library-panel {
      top: 20px;
      left: 20px;
      width: 280px;
      padding: var(--space-lg);
    }
    .panel-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: var(--space-md);
      margin-bottom: var(--space-md);
    }
    .panel-title h1,
    .panel-title h2 {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      font-weight: 600;
    }
    .panel-title span,
    .hint {
      color: var(--text-faint);
      font-size: 12px;
      line-height: 1.45;
    }
    #node-search {
      width: 100%;
      height: 36px;
      margin-bottom: var(--space-md);
      padding: 0 var(--space-md);
      border-radius: 10px;
      border: 1px solid var(--line);
      background: oklch(17% 0.016 276 / 0.92);
      color: var(--text);
      outline: none;
    }
    #node-search::placeholder { color: var(--text-faint); }
    #node-search:focus {
      border-color: var(--line-strong);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    #node-library {
      display: grid;
      gap: 6px;
      max-height: 48vh;
      overflow: auto;
      padding-right: 2px;
    }
    .library-item,
    .validation-item,
    #context-menu button {
      width: 100%;
      border: 0;
      color: inherit;
      text-align: left;
      cursor: pointer;
      font: inherit;
    }
    .library-item {
      display: grid;
      gap: 2px;
      padding: 9px 10px;
      border-radius: 10px;
      background: transparent;
      border: 1px solid transparent;
      transition: background 120ms ease, border-color 120ms ease;
    }
    .library-item:hover,
    .library-item:focus-visible {
      background: var(--surface-soft);
      border-color: var(--line);
      outline: none;
    }
    .library-item strong { font-size: 13px; font-weight: 560; }
    .library-item span { color: var(--text-faint); font-size: 12px; }

    .inspector-panel {
      right: 20px;
      bottom: 20px;
      width: 310px;
      padding: var(--space-lg);
    }
    #validation-list {
      display: grid;
      gap: 6px;
      max-height: 30vh;
      overflow: auto;
    }
    .validation-item,
    .validation-ok {
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 12.5px;
      line-height: 1.38;
      background: oklch(28% 0.024 276 / 0.72);
      border: 1px solid var(--line);
    }
    .validation-item.warning {
      color: oklch(83% 0.07 54);
      background: oklch(30% 0.035 54 / 0.34);
      border-color: oklch(68% 0.09 54 / 0.24);
    }
    .validation-item.error {
      color: oklch(82% 0.08 18);
      background: oklch(30% 0.04 18 / 0.34);
      border-color: oklch(66% 0.095 18 / 0.25);
    }
    .validation-ok {
      color: var(--success);
      background: oklch(30% 0.034 130 / 0.26);
      border-color: oklch(70% 0.075 130 / 0.22);
    }

    .canvas-node {
      position: absolute;
      border-radius: 14px;
      cursor: pointer;
      user-select: none;
      color: var(--text);
    }
    .workflow-node {
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: 0 12px 28px oklch(8% 0.012 276 / 0.26);
    }
    .workflow-node.selected {
      outline: 2px solid oklch(78% 0.05 276 / 0.88);
      outline-offset: 2px;
      border-color: var(--line-strong);
    }
    .workflow-node.invalid { border-color: oklch(70% 0.09 54 / 0.45); }
    .workflow-node.unconfigured .node-title::after {
      content: "Needs config";
      display: inline-flex;
      margin-left: var(--space-sm);
      padding: 2px 6px;
      border-radius: 999px;
      color: oklch(82% 0.07 54);
      background: oklch(32% 0.04 54 / 0.38);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0;
      vertical-align: 2px;
    }
    .node-body {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      padding: 16px 20px;
    }
    .node-kicker { display: none; }
    .node-title {
      font-size: 17px;
      font-weight: 620;
      letter-spacing: -0.015em;
    }
    .node-subtitle {
      color: var(--text-muted);
      font-size: 12.5px;
      line-height: 1.38;
    }
    .ports {
      display: none;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 2px;
    }
    .workflow-node:hover .ports,
    .workflow-node.selected .ports,
    .workflow-node.connecting-source .ports {
      display: flex;
    }
    .port-pill {
      display: inline-flex;
      align-items: center;
      min-height: 19px;
      padding: 2px 6px;
      border-radius: 999px;
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
      font-size: 10px;
      color: var(--text-muted);
      border: 1px solid var(--line);
      background: oklch(28% 0.02 276 / 0.58);
    }
    .port-pill.out { color: oklch(79% 0.06 130 / 0.82); }
    .port-pill.in { color: oklch(78% 0.05 255 / 0.82); }

    .handle {
      position: absolute;
      top: 50%;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--bg);
      border: 1px solid oklch(70% 0.08 292 / 0.78);
      transform: translate(-50%, -50%);
      cursor: crosshair;
      pointer-events: auto;
      z-index: 2;
      transition: background 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
    }
    .handle::before {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: 999px;
    }
    .handle.input  { left: 0; }
    .handle.output { left: 100%; }
    .handle::after {
      content: attr(data-port-label);
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      padding: 1px 5px;
      border-radius: 999px;
      color: var(--text-faint);
      background: oklch(19% 0.018 276 / 0.86);
      border: 1px solid oklch(70% 0.045 276 / 0.18);
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
      font-size: 10.5px;
      line-height: 1.35;
      opacity: 0.68;
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 120ms ease, color 120ms ease, border-color 120ms ease, background 120ms ease;
    }
    .handle.input::after { left: 16px; }
    .handle.output::after { right: 16px; }
    .handle:hover  {
      background: var(--accent);
      border-color: oklch(82% 0.04 292);
      box-shadow: 0 0 0 6px oklch(63% 0.12 292 / 0.12);
    }
    .workflow-node:hover .handle::after,
    .workflow-node.selected .handle::after,
    .workflow-node.connecting-source .handle::after,
    .handle:hover::after {
      opacity: 1;
      color: var(--text);
      border-color: oklch(70% 0.08 292 / 0.34);
      background: oklch(21% 0.02 276 / 0.95);
    }
    .handle.disabled { opacity: 0.24; cursor: not-allowed; }

    #context-menu {
      position: fixed;
      z-index: 10;
      width: 210px;
      padding: 6px;
      border-radius: 12px;
      background: oklch(21% 0.019 276 / 0.98);
      border: 1px solid var(--line);
      box-shadow: 0 16px 48px oklch(8% 0.012 276 / 0.34);
    }
    #context-menu[hidden] { display: none; }
    #context-menu button {
      padding: 8px 9px;
      border-radius: 8px;
      background: transparent;
    }
    #context-menu button:hover,
    #context-menu button:focus-visible {
      background: var(--surface-soft);
      outline: none;
    }

    @media (max-width: 1200px) {
      .library-panel {
        top: 12px;
        left: 12px;
        width: 248px;
        padding: 14px;
      }
      .inspector-panel {
        right: 12px;
        bottom: 12px;
        width: 286px;
        padding: 14px;
      }
      .library-item { padding: 7px 9px; }
      #node-library { gap: 2px; }
    }

    @media (max-width: 1100px) {
      .library-panel,
      .inspector-panel {
        overflow: hidden;
        transition: transform 180ms cubic-bezier(.2,.8,.2,1), opacity 180ms ease;
      }
      .library-panel > *,
      .inspector-panel > * {
        transition: opacity 120ms ease;
      }
      .library-panel {
        transform: translateX(calc(-100% + 46px));
      }
      .library-panel::after,
      .inspector-panel::before {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        writing-mode: vertical-rl;
        pointer-events: none;
      }
      .library-panel::after {
        content: "Nodes";
        right: 14px;
      }
      .inspector-panel {
        transform: translateX(calc(100% - 46px));
      }
      .inspector-panel::before {
        content: "Checks";
        left: 14px;
      }
      .library-panel:not(:hover):not(:focus-within) > *,
      .inspector-panel:not(:hover):not(:focus-within) > * {
        opacity: 0;
        pointer-events: none;
      }
      .library-panel:hover,
      .library-panel:focus-within,
      .inspector-panel:hover,
      .inspector-panel:focus-within {
        transform: translateX(0);
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="panel library-panel" aria-label="Node library">
      <div class="panel-title">
        <h1>Workflow nodes</h1>
        <span>Click to add</span>
      </div>
      <input id="node-search" type="search" placeholder="Search nodes…" aria-label="Search node library" />
      <div id="node-library"></div>
      <p class="hint" style="margin-top: 12px;">Right-click to insert. Shift-click to multi-select.</p>
    </aside>

    <section id="canvas-root" aria-label="Workflow canvas">
      <svg id="edges" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="world"></div>
    </section>

    <aside class="panel inspector-panel" aria-label="Validation and activity">
      <div class="panel-title">
        <h2>Validation</h2>
        <span id="action-stat">0 actions logged</span>
      </div>
      <div id="validation-list"></div>
      <p class="hint" style="margin-top: 12px;">Press ⌘/Ctrl-L to inspect the serialized action log.</p>
    </aside>

    <div id="context-menu" role="menu" hidden></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
