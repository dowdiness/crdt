<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canopy Canvas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f0f1a; }

    #canvas-root {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
      cursor: grab;
    }
    #canvas-root.panning { cursor: grabbing; }

    #world {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
      /* transform set by JS */
    }

    /* SVG edge layer — sits beneath nodes, transformed alongside #world. */
    #edges {
      position: absolute;
      top: 0; left: 0;
      overflow: visible;
      pointer-events: none;
      transform-origin: 0 0;
    }
    #edges path.edge {
      fill: none;
      stroke: #8250df;
      stroke-width: 2;
      opacity: 0.85;
    }
    #edges path.edge-pending {
      fill: none;
      stroke: #c792ea;
      stroke-width: 2;
      stroke-dasharray: 6 4;
      opacity: 0.9;
    }

    .canvas-node {
      position: absolute;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }
    .canvas-node.selected {
      box-shadow: 0 0 0 2px #fff, 0 0 0 4px #8250df;
    }
    .canvas-node[data-kind="Text"] {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: #e8e8f0;
      background: rgba(130, 160, 255, 0.08);
      border: 1px solid rgba(130, 160, 255, 0.2);
    }

    .handle {
      position: absolute;
      top: 50%;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #1a1a2e;
      border: 2px solid #8250df;
      transform: translate(-50%, -50%);
      cursor: crosshair;
      pointer-events: auto;
    }
    .handle.input  { left: 0; }
    .handle.output { left: 100%; }
    .handle:hover  { background: #8250df; }
  </style>
</head>
<body>
  <div id="canvas-root">
    <svg id="edges" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="world"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
