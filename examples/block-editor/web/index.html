<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canopy Block Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1a1a2e; color: #e8e8f0; font-family: 'Inter', sans-serif; }

    #toolbar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(130, 160, 255, 0.15);
    }

    #toolbar button {
      padding: 6px 14px;
      background: rgba(130, 160, 255, 0.1);
      border: 1px solid rgba(130, 160, 255, 0.25);
      border-radius: 6px;
      color: #e8e8f0;
      font-size: 13px;
      cursor: pointer;
    }
    #toolbar button:hover {
      background: rgba(130, 160, 255, 0.2);
    }

    #editor-blocks {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="btn-download">Download .md</button>
    <button id="btn-upload">Upload .md</button>
    <input type="file" id="file-input" accept=".md" style="display:none" />
  </div>
  <div id="editor-blocks"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
