<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canopy Block Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@fontsource-variable/iosevka@5/index.min.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #1a1a2e; color: #e8e8f0;
      font-family: 'Manrope', system-ui, sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Toolbar ──────────────────────────────────────────────── */
    nav[aria-label="Document tools"] {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a48;
    }

    nav[aria-label="Document tools"] button {
      padding: 6px 14px;
      background: rgba(130, 80, 223, 0.08);
      border: 1px solid rgba(130, 80, 223, 0.2);
      border-radius: 6px;
      color: #c8c8e0;
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 150ms ease-out, border-color 150ms ease-out, color 150ms ease-out;
    }
    nav[aria-label="Document tools"] button:hover {
      background: rgba(130, 80, 223, 0.15);
      border-color: rgba(130, 80, 223, 0.35);
      color: #e8e8f0;
    }
    nav[aria-label="Document tools"] button:active {
      background: rgba(130, 80, 223, 0.22);
    }
    nav[aria-label="Document tools"] button:focus-visible {
      outline: 2px solid #8250df;
      outline-offset: 2px;
    }

    /* ── Editor ───────────────────────────────────────────────── */
    #editor-blocks {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    /* Block focus — purple left accent */
    #editor-blocks [contenteditable]:focus-visible {
      outline: none;
      box-shadow: -3px 0 0 0 #8250df;
    }
    #editor-blocks [contenteditable]:focus:not(:focus-visible) {
      outline: none;
    }

    /* Empty editor placeholder */
    #editor-blocks:empty::after {
      content: "Start typing or upload a .md file";
      color: #5a5a7a;
      font-style: italic;
      display: block;
      padding: 4px 0;
    }

    /* ── Block spacing rhythm ─────────────────────────────────── */
    #editor-blocks > div + div { margin-top: 2px; }
    #editor-blocks > div[data-type="heading"] { margin-top: 20px; }
    #editor-blocks > div[data-type="heading"]:first-child { margin-top: 0; }
    #editor-blocks > div[data-type="divider"] { margin-top: 16px; }
    #editor-blocks > div[data-type="divider"] + div { margin-top: 16px; }

    /* ── List item markers ────────────────────────────────────── */
    #editor-blocks > div[data-type="list_item"] {
      position: relative;
    }
    #editor-blocks > div[data-type="list_item"]::before {
      position: absolute;
      left: 4px;
      color: #5a5a7a;
      pointer-events: none;
    }

    /* Bullet: • */
    #editor-blocks > div[data-list-style="bullet"]::before {
      content: "•";
    }

    /* Numbered: counter */
    #editor-blocks { counter-reset: list-number; }
    #editor-blocks > div[data-list-style="numbered"] { counter-increment: list-number; }
    #editor-blocks > div[data-list-style="numbered"]::before {
      content: counter(list-number) ".";
      font-variant-numeric: tabular-nums;
      font-size: 0.875rem;
    }
    /* Reset counter when a non-numbered block breaks the run */
    #editor-blocks > div:not([data-list-style="numbered"]) { counter-reset: list-number; }

    /* Todo: checkbox */
    #editor-blocks > div[data-list-style="todo"]::before {
      content: "☐";
      font-size: 0.875rem;
    }
    #editor-blocks > div[data-list-style="todo"][data-checked="true"]::before {
      content: "☑";
      color: #8250df;
    }
  </style>
</head>
<body>
  <nav aria-label="Document tools">
    <button id="btn-download">Download .md</button>
    <button id="btn-upload">Upload .md</button>
    <input type="file" id="file-input" accept=".md" aria-label="Upload markdown file" style="display:none" />
  </nav>
  <main>
    <div id="editor-blocks" role="textbox" aria-multiline="true" aria-label="Document editor"></div>
  </main>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
